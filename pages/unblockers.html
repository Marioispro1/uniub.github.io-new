<!DOCTYPE html>
<html style="background: linear-gradient(rgb(24,40,81), black); background-repeat: no-repeat; background-attachment: fixed;">

        padding: 10px 20px;
        font-size: 16px;

        background-color: green;
        color: white;
        cursor: pointer;
        display: flex;

        padding: 20px;
        color: white;
        text-align: center;
		border: 3px solid black; 
		border-radius: 15px;

      #popup input {
        width: 300px;
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;

    <div id="popup">

  <script src="../js/gamesmanager.js"></script>
  <script src="../modules/particles.js"></script>
  <script src="../modules/particleconfig.js"></script>
  <script>
    function showPopup() {
      document.getElementById('popup').style.display = 'block';
    }

    function redirect() {
      var website = document.getElementById('websiteInput').value;
      var encodedWebsite = 'https://' + ('@'.repeat(100)) + website;
      window.location.href = encodedWebsite;
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
